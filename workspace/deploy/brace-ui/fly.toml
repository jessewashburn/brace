# fly.toml app configuration file generated for brace-ui on 2026-03-22T13:43:38-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'brace-ui'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'immediate'

[env]
  DEFAULT_USER_ROLE = 'admin'
  ENABLE_COMMUNITY_SHARING = 'false'
  ENABLE_IMAGE_GENERATION = 'false'
  ENABLE_MESSAGE_RATING = 'false'
  ENABLE_SIGNUP = 'false'
  PORT = '8080'
  WEBUI_NAME = 'Brace'
  ENABLE_RAG_WEB_SEARCH = 'false'
  # Cache HuggingFace models on the persistent volume so first-boot download doesn't repeat
  HF_HOME = '/app/backend/data/.cache/huggingface'

[[mounts]]
  source = 'brace_data'
  destination = '/app/backend/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = 'shared-cpu-1x'
  memory = '2048mb'
